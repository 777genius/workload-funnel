name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      expected_sha:
        description: Commit SHA expected to receive the hosted gate dispatch
        required: true
        type: string

permissions:
  contents: read

jobs:
  verify:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@1e60f620b9541d16bece96c5465dc8ee9832be0b # v4.0.3
        with:
          node-version: 24.16.0
      - name: Enable pinned pnpm
        run: corepack enable && corepack prepare pnpm@10.33.4 --activate
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Check formatting
        run: pnpm format:check
      - name: Lint
        run: pnpm lint
      - name: Type-check
        run: pnpm typecheck
      - name: Run unit tests
        run: pnpm test
      - name: Check architecture dependencies
        run: pnpm architecture:check
      - name: Check package exports
        run: pnpm exports:check
      - name: Build active packages
        run: pnpm build
      - name: Run standalone hosted canary regression
        run: pnpm test:hosted-canary
      - name: Check release intent
        if: github.event_name == 'pull_request'
        run: pnpm changeset:status
      - name: Check patch whitespace
        run: git diff --check

  hosted-gate-dispatch-bootstrap:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    timeout-minutes: 1
    steps:
      - name: Validate dispatch and fail closed
        env:
          EXPECTED_SHA: ${{ inputs.expected_sha }}
        run: |
          if [[ ! "$EXPECTED_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            printf '%s\n' 'expected_sha must be exactly 40 lowercase hex characters.'
            exit 1
          fi
          if [[ "$EXPECTED_SHA" != "$GITHUB_SHA" ]]; then
            printf '%s\n' 'expected_sha does not match GITHUB_SHA.'
            exit 1
          fi
          printf '%s\n' 'Fail closed: production gate is not installed on main.'
          exit 1
