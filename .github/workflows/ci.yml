name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      expected_sha:
        description: Commit SHA expected to receive the hosted gate dispatch
        required: true
        type: string

permissions:
  contents: read

jobs:
  verify:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@1e60f620b9541d16bece96c5465dc8ee9832be0b # v4.0.3
        with:
          node-version: 24.16.0
      - name: Enable pinned pnpm
        run: corepack enable && corepack prepare pnpm@10.33.4 --activate
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Check formatting
        run: pnpm format:check
      - name: Lint
        run: pnpm lint
      - name: Type-check
        run: pnpm typecheck
      - name: Run unit tests
        run: pnpm test
      - name: Check architecture dependencies
        run: pnpm architecture:check
      - name: Check package exports
        run: pnpm exports:check
      - name: Build active packages
        run: pnpm build
      - name: Run standalone hosted canary regression
        run: pnpm test:hosted-canary
      - name: Check release intent
        if: github.event_name == 'pull_request'
        run: pnpm exec changeset status --since=origin/main
      - name: Check patch whitespace
        run: git diff --check

  production-readiness:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    timeout-minutes: 300
    steps:
      - name: Initialize evidence directory
        id: initialization
        timeout-minutes: 1
        continue-on-error: true
        run: |
          set -euo pipefail
          [[ "$GITHUB_RUN_ID" =~ ^[1-9][0-9]{0,19}$ ]]
          [[ "$GITHUB_RUN_ATTEMPT" =~ ^[1-9][0-9]{0,5}$ ]]
          evidence_root="$RUNNER_TEMP/wf-production-gate-$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT-evidence"
          test ! -e "$evidence_root"
          mkdir -- "$evidence_root"
          chmod 0700 -- "$evidence_root"
      - name: Check out exact source
        id: checkout
        timeout-minutes: 5
        continue-on-error: true
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.sha }}
      - name: Record hosted context
        id: context
        if: always()
        timeout-minutes: 2
        continue-on-error: true
        run: node tooling/hosted-production-gate/run.mjs initialize
      - name: Bind dispatch input to exact checked-out commit
        id: commit
        if: always()
        timeout-minutes: 2
        continue-on-error: true
        env:
          EXPECTED_SHA: ${{ inputs.expected_sha }}
        run: |
          set -euo pipefail
          [[ "$EXPECTED_SHA" =~ ^[a-f0-9]{40}$ ]]
          test "$EXPECTED_SHA" = "$GITHUB_SHA"
          test "$(git rev-parse --verify HEAD)" = "$GITHUB_SHA"
          git diff --quiet
          git diff --cached --quiet
          test -z "$(git status --porcelain=v1 --untracked-files=all)"
      - name: Set up exact Node.js
        id: node
        if: always()
        timeout-minutes: 5
        continue-on-error: true
        uses: actions/setup-node@1e60f620b9541d16bece96c5465dc8ee9832be0b # v4.0.3
        with:
          node-version: 24.16.0
      - name: Install exact dependencies
        id: install
        if: always()
        timeout-minutes: 15
        continue-on-error: true
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare pnpm@10.33.4 --activate
          pnpm install --frozen-lockfile
      - name: Build exact checked-out commit
        id: build
        if: always()
        timeout-minutes: 15
        continue-on-error: true
        run: |
          set -euo pipefail
          test "$(git rev-parse --verify HEAD)" = "$GITHUB_SHA"
          git diff --quiet
          git diff --cached --quiet
          pnpm build
          test "$(git rev-parse --verify HEAD)" = "$GITHUB_SHA"
          git diff --quiet
          git diff --cached --quiet
          test -z "$(git status --porcelain=v1 --untracked-files=all)"
      - name: Prove and prepare disposable host
        id: prepare
        if: >-
          always() && steps.checkout.outcome == 'success' &&
          steps.context.outcome == 'success' && steps.commit.outcome == 'success' &&
          steps.node.outcome == 'success' && steps.install.outcome == 'success' &&
          steps.build.outcome == 'success'
        timeout-minutes: 35
        continue-on-error: true
        run: |
          set -euo pipefail
          node_executable="$(realpath "$(command -v node)")"
          case "$node_executable" in
            "$RUNNER_TOOL_CACHE"/node/*/x64/bin/node) ;;
            *) exit 1 ;;
          esac
          sudo -n --preserve-env=GITHUB_WORKSPACE,GITHUB_SHA,GITHUB_RUN_ID,GITHUB_RUN_ATTEMPT,RUNNER_TEMP "$node_executable" tooling/hosted-production-gate/run.mjs prepare
      - name: Run production gate once
        id: gate
        if: always()
        timeout-minutes: 95
        continue-on-error: true
        run: |
          set -euo pipefail
          node_executable="$(realpath "$(command -v node)")"
          case "$node_executable" in
            "$RUNNER_TOOL_CACHE"/node/*/x64/bin/node) ;;
            *) exit 1 ;;
          esac
          sudo -n --preserve-env=GITHUB_WORKSPACE,GITHUB_SHA,GITHUB_RUN_ID,GITHUB_RUN_ATTEMPT,RUNNER_TEMP "$node_executable" tooling/hosted-production-gate/run.mjs gate
      - name: Recover cleanup first pass
        id: cleanup_first
        if: always()
        timeout-minutes: 25
        continue-on-error: true
        run: |
          set -euo pipefail
          node_executable="$(realpath "$(command -v node)")"
          case "$node_executable" in
            "$RUNNER_TOOL_CACHE"/node/*/x64/bin/node) ;;
            *) exit 1 ;;
          esac
          sudo -n --preserve-env=GITHUB_WORKSPACE,GITHUB_SHA,GITHUB_RUN_ID,GITHUB_RUN_ATTEMPT,RUNNER_TEMP "$node_executable" tooling/hosted-production-gate/run.mjs cleanup-1
      - name: Recover cleanup second pass
        id: cleanup_second
        if: always()
        timeout-minutes: 25
        continue-on-error: true
        run: |
          set -euo pipefail
          node_executable="$(realpath "$(command -v node)")"
          case "$node_executable" in
            "$RUNNER_TOOL_CACHE"/node/*/x64/bin/node) ;;
            *) exit 1 ;;
          esac
          sudo -n --preserve-env=GITHUB_WORKSPACE,GITHUB_SHA,GITHUB_RUN_ID,GITHUB_RUN_ATTEMPT,RUNNER_TEMP "$node_executable" tooling/hosted-production-gate/run.mjs cleanup-2
      - name: Remove hosted bootstrap state
        id: teardown
        if: always()
        timeout-minutes: 20
        continue-on-error: true
        run: |
          set -euo pipefail
          node_executable="$(realpath "$(command -v node)")"
          case "$node_executable" in
            "$RUNNER_TOOL_CACHE"/node/*/x64/bin/node) ;;
            *) exit 1 ;;
          esac
          sudo -n --preserve-env=GITHUB_WORKSPACE,GITHUB_SHA,GITHUB_RUN_ID,GITHUB_RUN_ATTEMPT,RUNNER_TEMP "$node_executable" tooling/hosted-production-gate/run.mjs teardown
      - name: Verify zero owned residue
        id: residue
        if: always()
        timeout-minutes: 10
        continue-on-error: true
        run: |
          set -euo pipefail
          node_executable="$(realpath "$(command -v node)")"
          case "$node_executable" in
            "$RUNNER_TOOL_CACHE"/node/*/x64/bin/node) ;;
            *) exit 1 ;;
          esac
          sudo -n --preserve-env=GITHUB_WORKSPACE,GITHUB_SHA,GITHUB_RUN_ID,GITHUB_RUN_ATTEMPT,RUNNER_TEMP "$node_executable" tooling/hosted-production-gate/run.mjs residue
      - name: Record workflow phase outcomes
        id: workflow_status
        if: always()
        timeout-minutes: 2
        continue-on-error: true
        env:
          BUILD_OUTCOME: ${{ steps.build.outcome }}
          CHECKOUT_OUTCOME: ${{ steps.checkout.outcome }}
          CLEANUP_FIRST_OUTCOME: ${{ steps.cleanup_first.outcome }}
          CLEANUP_SECOND_OUTCOME: ${{ steps.cleanup_second.outcome }}
          COMMIT_OUTCOME: ${{ steps.commit.outcome }}
          CONTEXT_OUTCOME: ${{ steps.context.outcome }}
          GATE_OUTCOME: ${{ steps.gate.outcome }}
          INSTALL_OUTCOME: ${{ steps.install.outcome }}
          INITIALIZATION_OUTCOME: ${{ steps.initialization.outcome }}
          NODE_OUTCOME: ${{ steps.node.outcome }}
          PREPARE_OUTCOME: ${{ steps.prepare.outcome }}
          RESIDUE_OUTCOME: ${{ steps.residue.outcome }}
          TEARDOWN_OUTCOME: ${{ steps.teardown.outcome }}
        run: |
          set -euo pipefail
          evidence_root="$RUNNER_TEMP/wf-production-gate-$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT-evidence"
          printf '{"build":"%s","checkout":"%s","cleanupFirst":"%s","cleanupSecond":"%s","commit":"%s","context":"%s","gate":"%s","initialization":"%s","install":"%s","node":"%s","prepare":"%s","residue":"%s","teardown":"%s"}\n' \
            "$BUILD_OUTCOME" "$CHECKOUT_OUTCOME" "$CLEANUP_FIRST_OUTCOME" "$CLEANUP_SECOND_OUTCOME" \
            "$COMMIT_OUTCOME" "$CONTEXT_OUTCOME" "$GATE_OUTCOME" "$INITIALIZATION_OUTCOME" "$INSTALL_OUTCOME" \
            "$NODE_OUTCOME" "$PREPARE_OUTCOME" "$RESIDUE_OUTCOME" "$TEARDOWN_OUTCOME" \
            > "$evidence_root/workflow-status.json"
          chmod 0444 -- "$evidence_root/workflow-status.json"
      - name: Seal checksummed evidence package
        id: package
        if: always()
        timeout-minutes: 8
        continue-on-error: true
        run: |
          set -euo pipefail
          node_executable="$(realpath "$(command -v node)")"
          case "$node_executable" in
            "$RUNNER_TOOL_CACHE"/node/*/x64/bin/node) ;;
            *) exit 1 ;;
          esac
          sudo -n --preserve-env=GITHUB_WORKSPACE,GITHUB_SHA,GITHUB_RUN_ID,GITHUB_RUN_ATTEMPT,RUNNER_TEMP "$node_executable" tooling/hosted-production-gate/run.mjs package
      - name: Seal fail-closed fallback evidence
        id: fallback
        if: always()
        timeout-minutes: 8
        env:
          BUILD_OUTCOME: ${{ steps.build.outcome }}
          CHECKOUT_OUTCOME: ${{ steps.checkout.outcome }}
          CLEANUP_FIRST_OUTCOME: ${{ steps.cleanup_first.outcome }}
          CLEANUP_SECOND_OUTCOME: ${{ steps.cleanup_second.outcome }}
          COMMIT_OUTCOME: ${{ steps.commit.outcome }}
          CONTEXT_OUTCOME: ${{ steps.context.outcome }}
          GATE_OUTCOME: ${{ steps.gate.outcome }}
          INITIALIZATION_OUTCOME: ${{ steps.initialization.outcome }}
          INSTALL_OUTCOME: ${{ steps.install.outcome }}
          NODE_OUTCOME: ${{ steps.node.outcome }}
          PACKAGE_OUTCOME: ${{ steps.package.outcome }}
          PREPARE_OUTCOME: ${{ steps.prepare.outcome }}
          RESIDUE_OUTCOME: ${{ steps.residue.outcome }}
          TEARDOWN_OUTCOME: ${{ steps.teardown.outcome }}
          WORKFLOW_STATUS_OUTCOME: ${{ steps.workflow_status.outcome }}
        run: |
          set -euo pipefail
          [[ "$GITHUB_SHA" =~ ^[a-f0-9]{40}$ ]]
          [[ "$GITHUB_RUN_ID" =~ ^[1-9][0-9]{0,19}$ ]]
          [[ "$GITHUB_RUN_ATTEMPT" =~ ^[1-9][0-9]{0,5}$ ]]
          evidence_root="$RUNNER_TEMP/wf-production-gate-$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT-evidence"
          if test ! -e "$evidence_root"; then
            mkdir -- "$evidence_root"
            chmod 0700 -- "$evidence_root"
          fi
          test -d "$evidence_root"
          test ! -L "$evidence_root"
          test "$(realpath "$evidence_root")" = "$evidence_root"
          required_outputs=(
            cleanup-1.json cleanup-1.log cleanup-1-status.json
            cleanup-2.json cleanup-2.log cleanup-2-status.json context.json evidence.json
            gate.log gate-status.json host-cleanup.json hosted-verdict.json
            prepare.json preflight.json host-state-evidence.json residue.json
            review-manifest.json workflow-status.json
          )
          complete=true
          for name in "${required_outputs[@]}"; do
            if test ! -f "$evidence_root/$name"; then complete=false; fi
          done
          if test "$PACKAGE_OUTCOME" = success && test "$complete" = true && test -f "$evidence_root/SHA256SUMS"; then
            file_count="$(find "$evidence_root" -maxdepth 1 -type f ! -name SHA256SUMS -printf '.\n' | wc -l)"
            sum_count="$(wc -l < "$evidence_root/SHA256SUMS")"
            if test "$file_count" = "$sum_count" &&
              (cd "$evidence_root" && sha256sum --check --strict SHA256SUMS >/dev/null); then
              exit 0
            fi
          fi
          seal=()
          if sudo -n true >/dev/null 2>&1; then
            seal=(sudo -n)
          else
            current_uid="$(id -u)"
            test "$(stat -c %u -- "$evidence_root")" = "$current_uid"
            test -z "$(find "$evidence_root" -maxdepth 1 ! -uid "$current_uid" -print -quit)"
          fi
          "${seal[@]}" chmod 0700 -- "$evidence_root"
          blocked_phase=package
          blocked_reason=package_failed_closed
          phases=(
            initialize checkout context commit-binding node-setup
            dependency-install build host-prepare production-gate cleanup-1
            cleanup-2 host-teardown residue workflow-status
          )
          outcomes=(
            "$INITIALIZATION_OUTCOME" "$CHECKOUT_OUTCOME" "$CONTEXT_OUTCOME" "$COMMIT_OUTCOME" "$NODE_OUTCOME"
            "$INSTALL_OUTCOME" "$BUILD_OUTCOME" "$PREPARE_OUTCOME" "$GATE_OUTCOME" "$CLEANUP_FIRST_OUTCOME"
            "$CLEANUP_SECOND_OUTCOME" "$TEARDOWN_OUTCOME" "$RESIDUE_OUTCOME" "$WORKFLOW_STATUS_OUTCOME"
          )
          for index in "${!phases[@]}"; do
            case "${outcomes[$index]}" in
              success) continue ;;
              cancelled|failure|skipped|'') ;;
              *) outcomes[$index]=failure ;;
            esac
            blocked_phase="${phases[$index]}"
            blocked_reason="${blocked_phase//-/_}_failed_closed"
            break
          done
          for name in "${required_outputs[@]}"; do
            if test "$name" = hosted-verdict.json; then continue; fi
            if test ! -e "$evidence_root/$name"; then
              if [[ "$name" = *.log ]]; then
                printf 'required output %s was not produced\n' "$name" > "$evidence_root/$name"
              else
                printf '{"available":false,"reason":"required_output_missing","requiredOutput":"%s"}\n' "$name" > "$evidence_root/$name"
              fi
            fi
          done
          "${seal[@]}" rm -f -- "$evidence_root/SHA256SUMS" "$evidence_root/hosted-verdict.json"
          printf '{"blockedPhase":"%s","commit":"%s","overallVerdict":"BLOCKED","reason":"%s","runAttempt":"%s","runId":"%s","schemaVersion":"workload-funnel.hosted-production-gate.verdict.v1"}\n' \
            "$blocked_phase" "$GITHUB_SHA" "$blocked_reason" "$GITHUB_RUN_ATTEMPT" "$GITHUB_RUN_ID" \
            > "$evidence_root/hosted-verdict.json"
          test -z "$(find "$evidence_root" -mindepth 1 -maxdepth 1 ! -type f -print -quit)"
          (
            cd "$evidence_root"
            while IFS= read -r name; do
              digest="$(sha256sum -- "$name")"
              printf '%s  %s\n' "${digest%% *}" "$name"
            done < <(find . -maxdepth 1 -type f ! -name SHA256SUMS -printf '%f\n' | LC_ALL=C sort)
          ) > "$evidence_root/SHA256SUMS"
          "${seal[@]}" chmod 0444 -- "$evidence_root"/*
          "${seal[@]}" chmod 0555 -- "$evidence_root"
      - name: Upload immutable production-gate evidence
        if: always() && steps.fallback.outcome == 'success'
        timeout-minutes: 10
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: production-gate-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/wf-production-gate-${{ github.run_id }}-${{ github.run_attempt }}-evidence
          compression-level: 0
          if-no-files-found: error
          include-hidden-files: true
          overwrite: false
          retention-days: 90
      - name: Enforce fail-closed verdict
        if: always()
        timeout-minutes: 2
        run: node tooling/hosted-production-gate/run.mjs assert
