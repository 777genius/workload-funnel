name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@1e60f620b9541d8db1aa67f7f03b2a70a2e891 # v4.0.3
        with:
          node-version: 24.16.0
      - name: Enable pinned pnpm
        run: corepack enable && corepack prepare pnpm@10.33.4 --activate
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Check formatting
        run: pnpm format:check
      - name: Lint
        run: pnpm lint
      - name: Type-check
        run: pnpm typecheck
      - name: Run unit tests
        run: pnpm test
      - name: Check architecture dependencies
        run: pnpm architecture:check
      - name: Check package exports
        run: pnpm exports:check
      - name: Build active packages
        run: pnpm build
      - name: Check release intent
        if: github.event_name == 'pull_request'
        run: pnpm changeset:status
      - name: Check patch whitespace
        run: git diff --check
